<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../css/style.css" />
    <title>Skater Boys</title>
  </head>
  <body>
    <h1>Skater Boys</h1>

    <!-- MAIN STORY LAYOUT -->
    <section class="story-layout">
      <!-- LEFT: story content -->
      <div class="story-main">
        <img
          src="assets/gallery/cover.jpg"
          alt="Skater Boys cover"
          class="story-cover"
        />

        <blockquote class="story-scripture">
          A story about streamers, silence, noise, and the spaces in between.
        </blockquote>

        <a href="scenes.html" class="nav-button">Read scenes</a>
      </div>

      <!-- RIGHT: guide + characters -->
      <aside class="story-guide">
        <p class="guide-text">
          Notes, narration, quick thoughts, emotional guide. This space is
          allowed to be messy.
        </p>

        <!-- character cards (reused!) -->
        <a
          href="assets/characters/Ren_Hayashi/index.html"
          class="character-item"
        >
          <img
            src="assets/characters/Ren_Hayashi/gallery/profilePicture.png"
            alt="Ren_Hayashi"
          />
          <span>Ren_Hayashi</span>
        </a>

        <a
          href="assets/characters/Leo_Andrade/index.html"
          class="character-item"
        >
          <img
            src="assets/characters/Leo_Andrade/gallery/profilePicture.png"
            alt="Leo_Andrade"
          />
          <span>Leo_Andrade</span>
        </a>
      </aside>
    </section>

    <!-- GALLERY -->
    <section class="story-gallery">
      <img src="assets/gallery/1.jpg" alt="" />
      <img src="assets/gallery/2.jpg" alt="" />
      <img src="assets/gallery/3.jpg" alt="" />
      <img src="assets/gallery/4.jpg" alt="" />
      <img src="assets/gallery/5.jpg" alt="" />
      <img src="assets/gallery/6.jpg" alt="" />
    </section>

    <a href="../../index.html" class="nav-back"> ← Back to all stories </a>
  </body>
</html>
